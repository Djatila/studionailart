<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔧 Teste - Correção UUID para Deleção de Serviços</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 10px;
        }
        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
            transition: transform 0.2s;
        }
        .button:hover {
            transform: translateY(-2px);
        }
        .button.danger {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }
        .button.success {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }
        .log {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }
        .service-item {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
        }
        .service-item.test {
            border-left: 4px solid #3498db;
        }
        .uuid-display {
            font-family: 'Courier New', monospace;
            background: #e9ecef;
            padding: 5px;
            border-radius: 4px;
            font-size: 11px;
        }
        .status {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.warning { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Teste - Correção UUID para Deleção de Serviços</h1>
        <p>Esta ferramenta testa se a correção de UUID resolveu o problema de deleção de serviços.</p>
        
        <div class="grid">
            <div>
                <h3>🧪 Testes de UUID</h3>
                <button class="button" onclick="testUUIDGeneration()">Testar Geração de UUID</button>
                <button class="button success" onclick="createTestService()">Criar Serviço de Teste</button>
                <button class="button danger" onclick="deleteTestService()">Deletar Serviço de Teste</button>
                <button class="button" onclick="listAllServices()">Listar Todos os Serviços</button>
            </div>
            
            <div>
                <h3>🔍 Verificações</h3>
                <button class="button" onclick="checkSupabaseConnection()">Testar Conexão Supabase</button>
                <button class="button" onclick="validateExistingUUIDs()">Validar UUIDs Existentes</button>
                <button class="button" onclick="cleanupTestData()">Limpar Dados de Teste</button>
                <button class="button" onclick="clearLog()">Limpar Log</button>
            </div>
        </div>
        
        <div>
            <h3>📋 Serviços de Teste</h3>
            <div id="testServices"></div>
        </div>
        
        <div>
            <h3>📝 Log de Atividades</h3>
            <div id="log" class="log"></div>
        </div>
    </div>

    <script type="module">
        // Configuração do Supabase
        import { createClient } from 'https://cdn.skypack.dev/@supabase/supabase-js@2';
        
        const supabaseUrl = 'https://wnlqvqzqvqzqvqzq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InducXF2cXpxdnF6cXZxenEiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTczNDU0NzIwMCwiZXhwIjoyMDUwMTIzMjAwfQ.example';
        
        // Tentar obter as credenciais do localStorage ou usar valores padrão
        const storedUrl = localStorage.getItem('supabase_url');
        const storedKey = localStorage.getItem('supabase_anon_key');
        
        const finalUrl = storedUrl || supabaseUrl;
        const finalKey = storedKey || supabaseKey;
        
        const supabase = createClient(finalUrl, finalKey);
        
        let testServiceIds = [];
        
        function log(message, type = 'info') {
            const logElement = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            const className = type;
            logElement.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
            logElement.scrollTop = logElement.scrollHeight;
        }
        
        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }
        
        function isValidUUID(uuid) {
            const uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;
            return uuidRegex.test(uuid);
        }
        
        window.testUUIDGeneration = function() {
            log('🧪 Testando geração de UUID...', 'info');
            
            // Testar crypto.randomUUID()
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                const uuid1 = crypto.randomUUID();
                const uuid2 = crypto.randomUUID();
                
                log(`✅ crypto.randomUUID() disponível`, 'success');
                log(`UUID 1: ${uuid1}`, 'info');
                log(`UUID 2: ${uuid2}`, 'info');
                log(`UUID 1 válido: ${isValidUUID(uuid1) ? '✅' : '❌'}`, isValidUUID(uuid1) ? 'success' : 'error');
                log(`UUID 2 válido: ${isValidUUID(uuid2) ? '✅' : '❌'}`, isValidUUID(uuid2) ? 'success' : 'error');
                log(`UUIDs únicos: ${uuid1 !== uuid2 ? '✅' : '❌'}`, uuid1 !== uuid2 ? 'success' : 'error');
            } else {
                log('❌ crypto.randomUUID() não disponível', 'error');
            }
            
            // Testar Date.now().toString() (método antigo - problemático)
            const dateId = Date.now().toString();
            log(`\n🚫 Método antigo (problemático): ${dateId}`, 'warning');
            log(`É UUID válido: ${isValidUUID(dateId) ? '✅' : '❌'}`, isValidUUID(dateId) ? 'success' : 'error');
        }
        
        window.checkSupabaseConnection = async function() {
            log('🔗 Testando conexão com Supabase...', 'info');
            
            try {
                const { data, error } = await supabase
                    .from('services')
                    .select('count')
                    .limit(1);
                
                if (error) {
                    log(`❌ Erro de conexão: ${error.message}`, 'error');
                } else {
                    log('✅ Conexão com Supabase funcionando!', 'success');
                }
            } catch (err) {
                log(`❌ Erro inesperado: ${err.message}`, 'error');
            }
        }
        
        window.createTestService = async function() {
            log('🧪 Criando serviço de teste com UUID correto...', 'info');
            
            const testUUID = crypto.randomUUID();
            log(`UUID gerado: ${testUUID}`, 'info');
            
            const testService = {
                id: testUUID,
                designer_id: 'test-designer-uuid', // Usar um UUID de designer de teste
                name: `Serviço Teste UUID - ${new Date().toLocaleTimeString()}`,
                duration: 60,
                price: 50.00,
                description: 'Serviço criado para testar correção de UUID',
                category: 'services'
            };
            
            try {
                const { data, error } = await supabase
                    .from('services')
                    .insert(testService)
                    .select()
                    .single();
                
                if (error) {
                    log(`❌ Erro ao criar serviço: ${error.message}`, 'error');
                    log(`Detalhes do erro: ${JSON.stringify(error, null, 2)}`, 'error');
                } else {
                    log(`✅ Serviço criado com sucesso!`, 'success');
                    log(`ID do serviço: ${data.id}`, 'info');
                    testServiceIds.push(data.id);
                    updateTestServicesList();
                }
            } catch (err) {
                log(`❌ Erro inesperado: ${err.message}`, 'error');
            }
        }
        
        window.deleteTestService = async function() {
            if (testServiceIds.length === 0) {
                log('⚠️ Nenhum serviço de teste para deletar. Crie um primeiro.', 'warning');
                return;
            }
            
            const serviceId = testServiceIds[testServiceIds.length - 1];
            log(`🗑️ Tentando deletar serviço: ${serviceId}`, 'info');
            
            try {
                const { error } = await supabase
                    .from('services')
                    .delete()
                    .eq('id', serviceId);
                
                if (error) {
                    log(`❌ Erro ao deletar serviço: ${error.message}`, 'error');
                    log(`Código do erro: ${error.code}`, 'error');
                    log(`Detalhes: ${error.details}`, 'error');
                } else {
                    log(`✅ Serviço deletado com sucesso!`, 'success');
                    testServiceIds.pop();
                    updateTestServicesList();
                }
            } catch (err) {
                log(`❌ Erro inesperado: ${err.message}`, 'error');
            }
        }
        
        window.listAllServices = async function() {
            log('📋 Listando todos os serviços...', 'info');
            
            try {
                const { data, error } = await supabase
                    .from('services')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(10);
                
                if (error) {
                    log(`❌ Erro ao listar serviços: ${error.message}`, 'error');
                } else {
                    log(`📊 Encontrados ${data.length} serviços`, 'info');
                    data.forEach(service => {
                        const isValidId = isValidUUID(service.id);
                        log(`${isValidId ? '✅' : '❌'} ${service.name} (ID: ${service.id})`, isValidId ? 'success' : 'error');
                    });
                }
            } catch (err) {
                log(`❌ Erro inesperado: ${err.message}`, 'error');
            }
        }
        
        window.validateExistingUUIDs = async function() {
            log('🔍 Validando UUIDs existentes...', 'info');
            
            try {
                const { data, error } = await supabase
                    .from('services')
                    .select('id, name')
                    .order('created_at', { ascending: false });
                
                if (error) {
                    log(`❌ Erro ao buscar serviços: ${error.message}`, 'error');
                    return;
                }
                
                let validCount = 0;
                let invalidCount = 0;
                
                data.forEach(service => {
                    const isValid = isValidUUID(service.id);
                    if (isValid) {
                        validCount++;
                    } else {
                        invalidCount++;
                        log(`❌ UUID inválido: ${service.name} (${service.id})`, 'error');
                    }
                });
                
                log(`\n📊 Resultado da validação:`, 'info');
                log(`✅ UUIDs válidos: ${validCount}`, 'success');
                log(`❌ UUIDs inválidos: ${invalidCount}`, invalidCount > 0 ? 'error' : 'success');
                
                if (invalidCount === 0) {
                    log('🎉 Todos os UUIDs estão corretos!', 'success');
                }
            } catch (err) {
                log(`❌ Erro inesperado: ${err.message}`, 'error');
            }
        }
        
        window.cleanupTestData = async function() {
            if (testServiceIds.length === 0) {
                log('⚠️ Nenhum serviço de teste para limpar.', 'warning');
                return;
            }
            
            log(`🧹 Limpando ${testServiceIds.length} serviço(s) de teste...`, 'info');
            
            for (const serviceId of testServiceIds) {
                try {
                    const { error } = await supabase
                        .from('services')
                        .delete()
                        .eq('id', serviceId);
                    
                    if (error) {
                        log(`❌ Erro ao deletar ${serviceId}: ${error.message}`, 'error');
                    } else {
                        log(`✅ Deletado: ${serviceId}`, 'success');
                    }
                } catch (err) {
                    log(`❌ Erro inesperado ao deletar ${serviceId}: ${err.message}`, 'error');
                }
            }
            
            testServiceIds = [];
            updateTestServicesList();
            log('🎯 Limpeza concluída!', 'info');
        }
        
        function updateTestServicesList() {
            const container = document.getElementById('testServices');
            
            if (testServiceIds.length === 0) {
                container.innerHTML = '<p>Nenhum serviço de teste ativo.</p>';
                return;
            }
            
            container.innerHTML = testServiceIds.map(id => `
                <div class="service-item test">
                    <strong>Serviço de Teste</strong><br>
                    <div class="uuid-display">ID: ${id}</div>
                    <div class="status ${isValidUUID(id) ? 'success' : 'error'}">
                        ${isValidUUID(id) ? 'UUID Válido' : 'UUID Inválido'}
                    </div>
                </div>
            `).join('');
        }
        
        // Inicializar
        log('🚀 Ferramenta de teste UUID inicializada!', 'info');
        log('💡 Use os botões acima para testar a correção de UUID.', 'info');
        updateTestServicesList();
        
    </script>
</body>
</html>
